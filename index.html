<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Day/Night Cycle Canvas</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
// ==========================================
// 1. SYSTEM SETUP & CONSTANTS
// ==========================================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    initScene();
});

const CYCLE_DURATION = 20000; // 20 seconds for a full day/night cycle

// ==========================================
// 2. MATH & UTILITY FUNCTIONS
// ==========================================
const smoothstep = (min, max, value) => {
    const x = Math.max(0, Math.min(1, (value - min) / (max - min)));
    return x * x * (3 - 2 * x);
};

const colorLerp = (c1, c2, t) => [
    c1[0] + (c2[0] - c1[0]) * t,
    c1[1] + (c2[1] - c1[1]) * t,
    c1[2] + (c2[2] - c1[2]) * t
];

const colorMultiLerp = (colors, stops, t) => {
    if (t <= stops[0]) return colors[0];
    if (t >= stops[stops.length - 1]) return colors[colors.length - 1];
    for (let i = 0; i < stops.length - 1; i++) {
        if (t >= stops[i] && t <= stops[i + 1]) {
            const localT = (t - stops[i]) / (stops[i + 1] - stops[i]);
            return colorLerp(colors[i], colors[i + 1], localT);
        }
    }
    return colors[0];
};

const toRGB = (c) => `rgb(${Math.floor(c[0])},${Math.floor(c[1])},${Math.floor(c[2])})`;
const toRGBA = (c, a) => `rgba(${Math.floor(c[0])},${Math.floor(c[1])},${Math.floor(c[2])},${a.toFixed(3)})`;

// Lightweight pseudo-noise substitute to replace missing `noise.noise2D`
const noise = {
    noise2D: (x, y) => (Math.sin(x * 12.9898 + y * 78.233) * 43758.5453) % 1
};

// ==========================================
// 3. SCENE GENERATION & HELPERS
// ==========================================
let stars = [], meteors = [], cloudLayerBack = [], cloudLayerMid = [], cloudLayerFront = [];

function initScene() {
    stars = [];
    for (let i = 0; i < 200; i++) {
        stars.push({
            x: Math.random(), y: Math.random() * 0.7,
            size: Math.random() * 1.5,
            brightness: Math.random(),
            twinkleSpeed: Math.random() * 5 + 1,
            twinkleOffset: Math.random() * Math.PI * 2
        });
    }

    const generateClouds = (count, sizeMultiplier) => {
        const arr = [];
        for (let i = 0; i < count; i++) {
            arr.push({
                x: Math.random() * W, y: Math.random() * H * 0.4,
                w: (Math.random() * 150 + 100) * sizeMultiplier,
                h: (Math.random() * 50 + 40) * sizeMultiplier,
                speed: (Math.random() * 0.2 + 0.1) * sizeMultiplier
            });
        }
        return arr;
    };

    cloudLayerBack = generateClouds(8, 0.6);
    cloudLayerMid = generateClouds(6, 1.0);
    cloudLayerFront = generateClouds(4, 1.5);
}
initScene();

function getSkyColors(phase) {
    const dayTop = [40, 120, 200], dayMid = [100, 180, 240], dayHoriz = [200, 230, 255];
    const duskTop = [30, 40, 80], duskMid = [120, 60, 80], duskHoriz = [255, 140, 60];
    const nightTop = [5, 10, 20], nightMid = [10, 20, 40], nightHoriz = [20, 30, 50];
    
    return {
        top: colorMultiLerp([dayTop, duskTop, nightTop, duskTop, dayTop], [0, 0.25, 0.5, 0.75, 1], phase),
        mid: colorMultiLerp([dayMid, duskMid, nightMid, duskMid, dayMid], [0, 0.25, 0.5, 0.75, 1], phase),
        horizon: colorMultiLerp([dayHoriz, duskHoriz, nightHoriz, duskHoriz, dayHoriz], [0, 0.25, 0.5, 0.75, 1], phase)
    };
}

function getSunMoonPos(phase) {
    const angle = phase * Math.PI * 2 - Math.PI / 2;
    const cx = W / 2, cy = H * 0.8;
    const r = W * 0.45;
    return {
        sunX: cx + Math.cos(angle) * r,
        sunY: cy + Math.sin(angle) * r,
        moonX: cx + Math.cos(angle + Math.PI) * r,
        moonY: cy + Math.sin(angle + Math.PI) * r
    };
}

function getHillY(x) {
    return H * 0.75 + Math.sin(x * 0.002) * H * 0.08 + Math.cos(x * 0.005) * H * 0.03;
}

function spawnMeteor(time) {
    meteors.push({
        x: Math.random() * W, y: Math.random() * H * 0.3,
        vx: (Math.random() - 0.5) * 10 - 5, vy: Math.random() * 5 + 5,
        size: Math.random() * 2 + 1, life: 0, maxLife: Math.random() * 20 + 20
    });
}

function drawTree(ctx, x, y, size, phase) {
    ctx.fillStyle = colorLerp([20, 30, 20], [5, 10, 5], smoothstep(0.3, 0.7, phase));
    ctx.beginPath();
    ctx.moveTo(x - size * 0.1, y);
    ctx.lineTo(x + size * 0.1, y);
    ctx.lineTo(x, y - size);
    ctx.fill();
}

function drawHouse(ctx, x, y, size, phase) {
    const isNight = phase > 0.3 && phase < 0.7;
    ctx.fillStyle = colorLerp([60, 50, 50], [10, 10, 15], smoothstep(0.3, 0.7, phase));
    ctx.fillRect(x - size * 0.4, y - size * 0.6, size * 0.8, size * 0.6);
    ctx.beginPath();
    ctx.moveTo(x - size * 0.5, y - size * 0.6);
    ctx.lineTo(x, y - size);
    ctx.lineTo(x + size * 0.5, y - size * 0.6);
    ctx.fill();
    // Window
    ctx.fillStyle = isNight ? '#ffcc00' : '#446688';
    ctx.fillRect(x - size * 0.15, y - size * 0.4, size * 0.3, size * 0.25);
}

function drawGrass(ctx, phase, time) {
    const grassColor = colorLerp([50, 90, 40], [10, 20, 10], smoothstep(0.3, 0.7, phase));
    ctx.strokeStyle = toRGB(grassColor);
    ctx.lineWidth = 2;
    for (let x = 0; x < W; x += 15) {
        const y = getHillY(x);
        const sway = Math.sin(time * 0.002 + x * 0.05) * 5;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + sway, y - 10 - Math.random() * 10);
        ctx.stroke();
    }
}

// ==========================================
// 4. CLOUD RENDERING (Bridging logic)
// ==========================================
function renderCloud(ctx, cloud, phase, time, layerDepth) {
    cloud.x -= cloud.speed;
    if (cloud.x + cloud.w < 0) cloud.x = W + cloud.w;

    ctx.save();
    const cloudX = cloud.x;
    const cloudY = cloud.y;
    const cloudW = cloud.w;
    const cloudH = cloud.h;
    
    const nightAmount = smoothstep(0.25, 0.5, phase) - smoothstep(0.75, 1.0, phase);
    const { sunX, sunY } = getSunMoonPos(phase);
    
    const dx = sunX - cloudX;
    const dy = sunY - cloudY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const sunCloseness = Math.max(0, 1 - dist / (W * 0.4));
    const edgeGlow = sunCloseness * (1 - nightAmount);

    const lightColor = [255, 255, 255];
    const baseColor = colorLerp([240, 245, 255], [60, 65, 80], nightAmount);
    const shadowColor = colorLerp([200, 210, 225], [30, 35, 45], nightAmount);
    const glowColor = [255, 200, 100];

    const bufW = cloudW;
    const bufH = cloudH;

    // Build shape buffer
    const cloudBufCanvas = document.createElement('canvas');
    cloudBufCanvas.width = bufW;
    cloudBufCanvas.height = bufH;
    const sctx = cloudBufCanvas.getContext('2d');
    const cloudBuf = cloudBufCanvas;

    sctx.fillStyle = '#fff';
    sctx.beginPath();
    sctx.ellipse(bufW/2, bufH/2, bufW/2, bufH/2, 0, 0, Math.PI * 2);
    sctx.fill();

    // Build color buffer
    const colorBufCanvas = document.createElement('canvas');
    colorBufCanvas.width = bufW;
    colorBufCanvas.height = bufH;
    const cctx = colorBufCanvas.getContext('2d');
    const colorBuf = colorBufCanvas;

    const gradX1 = bufW/2, gradY1 = 0, gradX2 = bufW/2, gradY2 = bufH;

    // --- YOUR FIXED SNIPPET STARTS HERE ---
    const lightGrad = cctx.createLinearGradient(gradX1, gradY1, gradX2, gradY2);
    lightGrad.addColorStop(0, toRGB(lightColor));
    lightGrad.addColorStop(0.3, toRGB(baseColor));
    lightGrad.addColorStop(0.7, toRGB(baseColor));
    lightGrad.addColorStop(1, toRGB(shadowColor));
    
    cctx.fillStyle = lightGrad;
    cctx.fillRect(0, 0, bufW, bufH);
    
    // Add radial highlight near sun
    if (sunCloseness > 0.1) {
        const hlX = (sunX - (cloudX - cloudW/2)) / cloudW * bufW;
        const hlY = (sunY - (cloudY - cloudH/2)) / cloudH * bufH;
        const hlGrad = cctx.createRadialGradient(hlX, hlY, 0, hlX, hlY, bufW * 0.6);
        hlGrad.addColorStop(0, toRGBA(glowColor, edgeGlow * 0.5));
        hlGrad.addColorStop(0.5, toRGBA(glowColor, edgeGlow * 0.2));
        hlGrad.addColorStop(1, 'rgba(0,0,0,0)');
        cctx.fillStyle = hlGrad;
        cctx.fillRect(0, 0, bufW, bufH);
    }
    
    // Use cloud alpha as mask
    cctx.globalCompositeOperation = 'destination-in';
    cctx.drawImage(cloudBuf, 0, 0);
    cctx.globalCompositeOperation = 'source-over';
    
    // Edge glow effect
    if (edgeGlow > 0.05) {
        const edgeBuf = document.createElement('canvas');
        edgeBuf.width = bufW;
        edgeBuf.height = bufH;
        const ectx = edgeBuf.getContext('2d');
        ectx.filter = `blur(${Math.max(1, bufW * 0.02)}px)`;
        ectx.drawImage(cloudBuf, 0, 0);
        ectx.globalCompositeOperation = 'source-in';
        ectx.fillStyle = toRGBA(glowColor, 1);
        ectx.fillRect(0, 0, bufW, bufH);
        
        ctx.globalAlpha = edgeGlow;
        ctx.drawImage(edgeBuf, cloudX - cloudW/2 - 2, cloudY - cloudH/2 - 2, cloudW + 4, cloudH + 4);
    }
    
    // Draw final colored cloud
    ctx.globalAlpha = 0.85 - nightAmount * 0.3 + layerDepth * 0.1;
    ctx.drawImage(colorBuf, cloudX - cloudW/2, cloudY - cloudH/2, cloudW, cloudH);
    
    ctx.restore();
}

// ==========================================
// 5. MAIN RENDER LOOP (From provided code)
// ==========================================
let lastMeteorTime = 0;

function render(timestamp) {
    const time = timestamp || 0;
    const phase = (time % CYCLE_DURATION) / CYCLE_DURATION;
    
    ctx.clearRect(0, 0, W, H);
    
    const skyColors = getSkyColors(phase);
    const { sunX, sunY, moonX, moonY } = getSunMoonPos(phase);
    
    // === SKY GRADIENT ===
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H * 0.7);
    skyGrad.addColorStop(0, toRGB(skyColors.top));
    skyGrad.addColorStop(0.45, toRGB(skyColors.mid));
    skyGrad.addColorStop(1, toRGB(skyColors.horizon));
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H);
    
    // Atmospheric scattering near horizon
    const nightAmount = Math.max(0, smoothstep(0.25, 0.4, phase) - smoothstep(0.6, 0.75, phase));
    const sunsetAmount = Math.max(
        smoothstep(0.12, 0.25, phase) - smoothstep(0.35, 0.45, phase),
        smoothstep(0.55, 0.65, phase) - smoothstep(0.78, 0.88, phase)
    );
    
    // Horizon glow
    if (sunY < H * 0.8) {
        const horizonGlow = ctx.createRadialGradient(sunX, H * 0.65, 0, sunX, H * 0.65, W * 0.7);
        const glowColor = colorMultiLerp(
            [[255,230,180],[255,170,90],[255,130,60],[255,170,90],[255,230,180]],
            [0, 0.2, 0.25, 0.3, 0.5], phase < 0.5 ? phase : 1 - phase
        );
        const glowIntensity = Math.max(0, 1 - nightAmount) * (0.15 + sunsetAmount * 0.3);
        horizonGlow.addColorStop(0, toRGBA(glowColor, glowIntensity));
        horizonGlow.addColorStop(0.4, toRGBA(glowColor, glowIntensity * 0.3));
        horizonGlow.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = horizonGlow;
        ctx.fillRect(0, 0, W, H);
    }
    
    // === STARS ===
    if (nightAmount > 0.1) {
        for (const star of stars) {
            const twinkle = 0.5 + 0.5 * Math.sin(time * 0.001 * star.twinkleSpeed + star.twinkleOffset);
            const alpha = nightAmount * twinkle * (0.4 + star.brightness * 0.6);
            if (alpha < 0.05) continue;
            
            const sx = star.x * W;
            const sy = star.y * H;
            const sr = star.size * (0.8 + twinkle * 0.4);
            
            const starGrad = ctx.createRadialGradient(sx, sy, 0, sx, sy, sr * 2);
            starGrad.addColorStop(0, toRGBA([220, 230, 255], alpha));
            starGrad.addColorStop(0.3, toRGBA([200, 210, 240], alpha * 0.5));
            starGrad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = starGrad;
            ctx.beginPath();
            ctx.arc(sx, sy, sr * 2, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = toRGBA([255, 255, 255], alpha);
            ctx.beginPath();
            ctx.arc(sx, sy, sr * 0.5, 0, Math.PI * 2);
            ctx.fill();
        }
    }
    
    // === METEORS ===
    if (nightAmount > 0.5 && time - lastMeteorTime > 800 + Math.random() * 1500) {
        spawnMeteor(time);
        lastMeteorTime = time;
    }
    
    for (let i = meteors.length - 1; i >= 0; i--) {
        const m = meteors[i];
        m.x += m.vx;
        m.y += m.vy;
        m.life++;
        
        if (m.life > m.maxLife) {
            meteors.splice(i, 1);
            continue;
        }
        
        const alpha = nightAmount * Math.min(1, m.life / 5) * Math.max(0, 1 - m.life / m.maxLife);
        if (alpha < 0.01) continue;
        
        const trailLen = 30;
        const grad = ctx.createLinearGradient(
            m.x, m.y, m.x - m.vx * trailLen, m.y - m.vy * trailLen
        );
        grad.addColorStop(0, toRGBA([255, 255, 255], alpha));
        grad.addColorStop(0.1, toRGBA([200, 220, 255], alpha * 0.6));
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        
        ctx.strokeStyle = grad;
        ctx.lineWidth = m.size;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(m.x, m.y);
        ctx.lineTo(m.x - m.vx * trailLen, m.y - m.vy * trailLen);
        ctx.stroke();
        
        // Head glow
        const headGrad = ctx.createRadialGradient(m.x, m.y, 0, m.x, m.y, m.size * 3);
        headGrad.addColorStop(0, toRGBA([255, 255, 255], alpha * 0.8));
        headGrad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = headGrad;
        ctx.beginPath();
        ctx.arc(m.x, m.y, m.size * 3, 0, Math.PI * 2);
        ctx.fill();
    }
    
    // === SUN ===
    if (sunY < H * 0.85) {
        const sunVis = smoothstep(H * 0.85, H * 0.5, sunY);
        
        // Outer glow layers
        for (let i = 3; i >= 0; i--) {
            const r = (80 + i * 60) * (W / 1920);
            const sunGlow = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, r);
            const glowC = i > 1 ? [255, 200, 100] : [255, 240, 200];
            sunGlow.addColorStop(0, toRGBA(glowC, sunVis * 0.1 / (i + 1)));
            sunGlow.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = sunGlow;
            ctx.beginPath();
            ctx.arc(sunX, sunY, r, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // Sun disc
        const sunR = 25 * (W / 1920);
        const sunDisc = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, sunR);
        sunDisc.addColorStop(0, toRGBA([255, 255, 240], sunVis));
        sunDisc.addColorStop(0.7, toRGBA([255, 230, 180], sunVis));
        sunDisc.addColorStop(1, toRGBA([255, 200, 120], sunVis * 0.5));
        ctx.fillStyle = sunDisc;
        ctx.beginPath();
        ctx.arc(sunX, sunY, sunR, 0, Math.PI * 2);
        ctx.fill();
    }
    
    // === MOON ===
    if (moonY < H * 0.85) {
        const moonVis = smoothstep(H * 0.85, H * 0.5, moonY) * nightAmount;
        
        if (moonVis > 0.01) {
            // Moon glow
            const moonGlowR = 100 * (W / 1920);
            const moonGlow = ctx.createRadialGradient(moonX, moonY, 0, moonX, moonY, moonGlowR);
            moonGlow.addColorStop(0, toRGBA([180, 200, 230], moonVis * 0.2));
            moonGlow.addColorStop(0.5, toRGBA([140, 160, 200], moonVis * 0.05));
            moonGlow.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = moonGlow;
            ctx.beginPath();
            ctx.arc(moonX, moonY, moonGlowR, 0, Math.PI * 2);
            ctx.fill();
            
            // Moon disc
            const moonR = 18 * (W / 1920);
            const moonDisc = ctx.createRadialGradient(moonX, moonY, 0, moonX, moonY, moonR);
            moonDisc.addColorStop(0, toRGBA([230, 235, 245], moonVis));
            moonDisc.addColorStop(0.8, toRGBA([200, 210, 230], moonVis));
            moonDisc.addColorStop(1, toRGBA([180, 190, 210], moonVis * 0.3));
            ctx.fillStyle = moonDisc;
            ctx.beginPath();
            ctx.arc(moonX, moonY, moonR, 0, Math.PI * 2);
            ctx.fill();
            
            // Moon craters
            ctx.fillStyle = toRGBA([180, 190, 210], moonVis * 0.3);
            ctx.beginPath();
            ctx.arc(moonX - moonR * 0.3, moonY - moonR * 0.2, moonR * 0.15, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(moonX + moonR * 0.2, moonY + moonR * 0.25, moonR * 0.1, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(moonX + moonR * 0.1, moonY - moonR * 0.35, moonR * 0.08, 0, Math.PI * 2);
            ctx.fill();
        }
    }
    
    // === BACK CLOUDS ===
    for (const cloud of cloudLayerBack) {
        renderCloud(ctx, cloud, phase, time, 0.3);
    }
    
    // === MID CLOUDS ===
    for (const cloud of cloudLayerMid) {
        renderCloud(ctx, cloud, phase, time, 0.6);
    }
    
    // === FRONT CLOUDS ===
    for (const cloud of cloudLayerFront) {
        renderCloud(ctx, cloud, phase, time, 0.9);
    }
    
    // === GROUND / HILLS ===
    // Far hills (background)
    const farHillColor = colorMultiLerp(
        [[80, 110, 75], [75, 80, 60], [18, 22, 28], [75, 80, 60], [80, 110, 75]],
        [0, 0.22, 0.5, 0.78, 1], phase
    );
    
    ctx.beginPath();
    ctx.moveTo(0, H);
    for (let x = 0; x <= W; x += 10) {
        const y = H * 0.62 + Math.sin(x / W * Math.PI * 1.5 + 2) * H * 0.04 + noise.noise2D(x * 0.003, 100) * H * 0.01;
        ctx.lineTo(x, y);
    }
    ctx.lineTo(W, H);
    ctx.closePath();
    
    const farHillGrad = ctx.createLinearGradient(0, H * 0.58, 0, H * 0.72);
    farHillGrad.addColorStop(0, toRGBA(farHillColor, 0.7));
    farHillGrad.addColorStop(1, toRGBA(colorLerp(farHillColor, [0,0,0], 0.2), 0.8));
    ctx.fillStyle = farHillGrad;
    ctx.fill();
    
    // Main hill
    const hillColor = colorMultiLerp(
        [[50, 80, 38], [60, 65, 40], [12, 18, 12], [60, 65, 40], [50, 80, 38]],
        [0, 0.22, 0.5, 0.78, 1], phase
    );
    const hillHighlight = colorMultiLerp(
        [[75, 110, 55], [100, 95, 60], [18, 25, 18], [100, 95, 60], [75, 110, 55]],
        [0, 0.22, 0.5, 0.78, 1], phase
    );
    
    ctx.beginPath();
    ctx.moveTo(0, H);
    for (let x = 0; x <= W; x += 10) {
        ctx.lineTo(x, getHillY(x));
    }
    ctx.lineTo(W, H);
    ctx.closePath();
    
    const hillGrad = ctx.createLinearGradient(0, H * 0.6, 0, H);
    hillGrad.addColorStop(0, toRGB(hillHighlight));
    hillGrad.addColorStop(0.3, toRGB(hillColor));
    hillGrad.addColorStop(1, toRGB(colorLerp(hillColor, [0,0,0], 0.3)));
    ctx.fillStyle = hillGrad;
    ctx.fill();
    
    // Sunlight on hill
    if (sunY < H * 0.8) {
        const sunOnHill = ctx.createRadialGradient(sunX, H * 0.65, 0, sunX, H * 0.65, W * 0.5);
        const sunHillIntensity = Math.max(0, (1 - nightAmount)) * sunsetAmount * 0.15;
        sunOnHill.addColorStop(0, toRGBA([255, 200, 120], sunHillIntensity));
        sunOnHill.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = sunOnHill;
        ctx.beginPath();
        ctx.moveTo(0, H);
        for (let x = 0; x <= W; x += 10) {
            ctx.lineTo(x, getHillY(x));
        }
        ctx.lineTo(W, H);
        ctx.closePath();
        ctx.fill();
    }
    
    // === TREE ===
    const treeX = W * 0.72;
    const treeBaseY = getHillY(treeX);
    drawTree(ctx, treeX, treeBaseY, H * 0.2, phase);
    
    // === HOUSE ===
    const houseX = W * 0.38;
    const houseBaseY = getHillY(houseX);
    drawHouse(ctx, houseX, houseBaseY, H * 0.13, phase);
    
    // === GRASS ===
    drawGrass(ctx, phase, time);
    
    // === ATMOSPHERIC FOG ===
    const fogColor = colorMultiLerp(
        [[180, 195, 210], [190, 160, 130], [15, 18, 30], [190, 160, 130], [180, 195, 210]],
        [0, 0.22, 0.5, 0.78, 1], phase
    );
    
    const fogGrad = ctx.createLinearGradient(0, H * 0.5, 0, H * 0.75);
    fogGrad.addColorStop(0, 'rgba(0,0,0,0)');
    fogGrad.addColorStop(0.5, toRGBA(fogColor, 0.06));
    fogGrad.addColorStop(1, toRGBA(fogColor, 0.12));
    ctx.fillStyle = fogGrad;
    ctx.fillRect(0, H * 0.5, W, H * 0.25);
    
    // === VIGNETTE ===
    const vignette = ctx.createRadialGradient(W/2, H/2, W * 0.3, W/2, H/2, W * 0.8);
    vignette.addColorStop(0, 'rgba(0,0,0,0)');
    vignette.addColorStop(1, toRGBA([0,0,0], 0.25 + nightAmount * 0.15));
    ctx.fillStyle = vignette;
    ctx.fillRect(0, 0, W, H);
    
    // === FILM GRAIN (subtle) ===
    ctx.globalAlpha = 0.015;
    for (let i = 0; i < 1000; i++) {
        const gx = Math.random() * W;
        const gy = Math.random() * H;
        const gb = Math.random() > 0.5 ? 255 : 0;
        ctx.fillStyle = `rgb(${gb},${gb},${gb})`;
        ctx.fillRect(gx, gy, 1.5, 1.5);
    }
    ctx.globalAlpha = 1;
    
    requestAnimationFrame(render);
}

requestAnimationFrame(render);
</script>
</body>
</html>
